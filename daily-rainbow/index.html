<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Rainbow</title>
    <meta name="description" content="Daily Rainbow support and privacy links.">
    <style>
      :root {
        color-scheme: light dark;
        --background: #f8fbf3;
        --text: #18231d;
        --muted: #536157;
        --panel: #ffffff;
        --accent: #2f8f5b;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #17211d;
          --text: #eef7ef;
          --muted: #b8c8bd;
          --panel: #213029;
          --accent: #7ed99c;
        }
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 56px 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 7vw, 3.25rem);
        line-height: 1.05;
      }

      p {
        color: var(--muted);
        font-size: 1.05rem;
      }

      nav {
        display: grid;
        gap: 12px;
        margin-top: 32px;
      }

      a {
        color: var(--accent);
      }

      nav a {
        display: block;
        padding: 16px 18px;
        border: 1px solid color-mix(in srgb, var(--accent) 26%, transparent);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        font-weight: 650;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Daily Rainbow</h1>
      <p>A lightweight fruit and vegetable habit tracker for iPhone.</p>
      <nav aria-label="Daily Rainbow links">
        <a href="./support/">Support</a>
        <a href="./privacy/">Privacy Policy</a>
      </nav>
    </main>
  </body>
</html>
