<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Insparrows Apps</title>
    <meta
      name="description"
      content="Landing page for Insparrows app support and privacy pages."
    >
    <style>
      :root {
        color-scheme: light dark;
        --background: #f7f8f2;
        --text: #18231d;
        --muted: #556259;
        --panel: #ffffff;
        --border: rgba(47, 143, 91, 0.22);
        --accent: #2f8f5b;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #17211d;
          --text: #eef7ef;
          --muted: #b7c7bc;
          --panel: #213029;
          --border: rgba(126, 217, 156, 0.28);
          --accent: #7ed99c;
        }
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(47, 143, 91, 0.1), transparent 40%), var(--background);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, calc(100% - 48px));
        padding: 40px 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 6vw, 3.2rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 32px 0 0;
        display: grid;
        gap: 14px;
      }

      a {
        display: block;
        padding: 18px 20px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        color: var(--text);
        text-decoration: none;
        font-weight: 650;
      }

      a span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.98rem;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Insparrows</h1>
      <p>App information pages published with GitHub Pages.</p>
      <ul aria-label="Published apps">
        <li>
          <a href="./daily-rainbow/">
            Daily Rainbow
            <span>Fruit and vegetable habit tracker support and privacy pages.</span>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
